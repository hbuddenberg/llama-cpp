name: Build and push image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space for CUDA build
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/llama-tom:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Set the ENGINE_SOURCE_REF repository variable to a commit SHA
          # for reproducible builds; falls back to the main branch tip.
          build-args: |
            SOURCE_REF=${{ vars.ENGINE_SOURCE_REF || 'main' }}
