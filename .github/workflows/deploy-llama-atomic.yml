name: Build and push llama-atomic image

on:
  push:
    branches: [main]
    paths:
      - "llama-atomic/**"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Upstream fork git ref (branch, tag, or SHA)"
        required: false
        default: "main"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space for CUDA build
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: llama-atomic
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/llama-atomic:latest
          build-args: |
            SOURCE_REF=${{ inputs.source_ref || vars.ENGINE_SOURCE_REF || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
