name: Build and push llama-tom image

on:
  push:
    branches: [main]
    paths:
      - "llama-tom/**"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Upstream fork git ref (branch, tag, or SHA)"
        required: false
        default: "feature/turboquant-kv-cache"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space for CUDA build
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: llama-tom
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/llama-tom:latest
          build-args: |
            SOURCE_REF=${{ inputs.source_ref || vars.ENGINE_SOURCE_REF || 'feature/turboquant-kv-cache' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
