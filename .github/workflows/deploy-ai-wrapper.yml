name: Build and push ai-wrapper image

on:
  push:
    branches: [main]
    paths:
      - "ai-wrapper/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ai-wrapper
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ai-wrapper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
